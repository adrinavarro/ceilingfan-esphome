# Safe first-stage firmware. It verifies the CC1101 and enables Wi-Fi/OTA.
substitutions:
  device_name: ceilingfan-onboarding
  friendly_name: Ceiling fan onboarding

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.12.0
  on_boot:
    priority: -100
    then:
      - cc1101.begin_rx

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} fallback"
    password: !secret fallback_password

captive_portal:

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

cc1101:
  id: radio
  cs_pin: GPIO14
  frequency: 433.92MHz
  modulation_type: ASK/OOK
  symbol_rate: 5000
  output_power: 0

# GDO2 is receive-only in the recommended dual-pin wiring.
remote_receiver:
  pin: GPIO27
  dump: raw
  filter: 50us
  idle: 10ms

